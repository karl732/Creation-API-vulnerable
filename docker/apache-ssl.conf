# VirtualHost HTTPS pour l'application banking (certificats dans /etc/apache2/ssl/)
# Ne pas ajouter "Listen 443 https" ici : l'image Apache le définit déjà (ex. mod_ssl), double définition = "Cannot define multiple Listeners"
<VirtualHost *:443>
    ServerName localhost
    DocumentRoot /var/www/html

    SSLEngine on
    SSLCertificateFile /etc/apache2/ssl/server.crt
    SSLCertificateKeyFile /etc/apache2/ssl/server.key

    # HSTS : forcer le navigateur à n'utiliser que HTTPS pour ce site (1 an)
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"

    # Cookie de session : uniquement envoyé en HTTPS, non accessible en JavaScript (réduit vol de session / XSS)
    php_value session.cookie_secure 1
    php_value session.cookie_httponly 1
    php_value session.cookie_samesite Strict

    <Directory /var/www/html>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/ssl_error.log
    CustomLog ${APACHE_LOG_DIR}/ssl_access.log combined
</VirtualHost>
