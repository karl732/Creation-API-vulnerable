# Redirection de tout le trafic HTTP vers HTTPS (identifiants jamais en clair)
# Port 8443 = port HTTPS exposé par Docker (443 dans le conteneur)
<VirtualHost *:80>
    ServerName localhost
    RewriteEngine On
    RewriteCond %{HTTP_HOST} ^([^:]+)(:[0-9]+)?$ [NC]
    RewriteRule ^ https://%1:8443%{REQUEST_URI} [L,R=301]
</VirtualHost>
